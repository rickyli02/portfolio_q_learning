# Tiny single-asset GBM experiment for manual verification of the
# config-backed CTRL baseline runner (scripts/run_config_experiment.py).
# Values are intentionally small so the script completes quickly.

seed: 42

env:
  env_type: gbm
  horizon: 1.0
  n_steps: 10
  initial_wealth: 1.0
  mu: [0.08]
  sigma: [[0.20]]
  assets:
    n_risky: 1
    include_risk_free: true
    risk_free_rate: 0.05

reward:
  target_return: 1.0
  entropy_temp: 0.1

optim:
  n_epochs: 3
  n_steps_per_epoch: 2
  actor_lr: 1.0e-3
  critic_lr: 1.0e-3

eval:
  n_eval_episodes: 3

algo:
  algo_type: ctrl_baseline
  oracle_gamma_embed: 1.0
